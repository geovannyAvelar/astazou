name: Build and Push Docker images

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run backend tests
        run: ./gradlew test

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Install frontend dependencies
        run: pnpm install
        working-directory: ./ui

      - name: Run frontend lint
        run: pnpm lint
        working-directory: ./ui

      - name: Prepare tags and names
        id: vars
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          # Lowercase owner and repo to satisfy Docker/GHCR naming rules
          OWNER=$(echo "geovannyavelar" | cut -d'/' -f1 | tr '[:upper:]' '[:lower:]')
          REPO_NAME=$(echo "astazou" | cut -d'/' -f2 | tr '[:upper:]' '[:lower:]')
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "repo_name=$REPO_NAME" >> $GITHUB_OUTPUT
          echo "owner=$OWNER" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/${{ steps.vars.outputs.repo_name }}-backend:${{ steps.vars.outputs.short_sha }}
            ghcr.io/${{ steps.vars.outputs.owner }}/${{ steps.vars.outputs.repo_name }}-backend:latest
          platforms: linux/amd64

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./ui
          file: ./ui/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          cache-from: |
            type=registry,ref=ghcr.io/${{ steps.vars.outputs.owner }}/${{ steps.vars.outputs.repo_name }}-frontend:buildcache
            type=registry,ref=ghcr.io/${{ steps.vars.outputs.owner }}/${{ steps.vars.outputs.repo_name }}-frontend:latest
          cache-to: |
            type=registry,ref=ghcr.io/${{ steps.vars.outputs.owner }}/${{ steps.vars.outputs.repo_name }}-frontend:buildcache,mode=max
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/${{ steps.vars.outputs.repo_name }}-frontend:${{ steps.vars.outputs.short_sha }}
            ghcr.io/${{ steps.vars.outputs.owner }}/${{ steps.vars.outputs.repo_name }}-frontend:latest
          platforms: linux/amd64